<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RPi Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f12;
      --surface:   #13171d;
      --border:    #1f2530;
      --border-hi: #2e3a4a;
      --text:      #c8d4e0;
      --muted:     #546070;
      --accent:    #00e5ff;
      --accent2:   #ff5f40;
      --green:     #39ff91;
      --mono:      'Share Tech Mono', monospace;
      --sans:      'Barlow', sans-serif;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-weight: 300; }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.08) 2px, rgba(0,0,0,0.08) 4px);
      pointer-events: none; z-index: 999;
    }

    .shell { min-height: 100vh; display: grid; grid-template-rows: auto 1fr; }

    header {
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex; align-items: center; justify-content: space-between;
      background: var(--surface);
    }
    .logo { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: 0.15em; text-transform: uppercase; }
    .logo span { color: var(--muted); }
    .clock { font-family: var(--mono); font-size: 12px; color: var(--muted); letter-spacing: 0.1em; }

    main {
      padding: 40px 32px;
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 24px; align-items: start;
      max-width: 960px; margin: 0 auto; width: 100%;
    }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
    .card-header {
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .card-tag {
      font-family: var(--mono); font-size: 10px; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--muted);
      background: var(--bg); border: 1px solid var(--border);
      padding: 3px 8px; border-radius: 2px;
    }
    .card-title { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: 0.04em; }
    .card-body { padding: 24px 20px; }

    /* TOTP */
    .totp-display {
      font-family: var(--mono); font-size: 48px; letter-spacing: 0.25em;
      color: var(--green); text-align: center;
      padding: 24px 0 20px; min-height: 96px;
      display: flex; align-items: center; justify-content: center;
    }
    .totp-display.loading { color: var(--muted); font-size: 20px; letter-spacing: 0.1em; }
    .totp-display.error   { color: var(--accent2); font-size: 13px; letter-spacing: 0.05em; font-family: var(--sans); }
    @keyframes glow-in {
      0%   { text-shadow: 0 0 0 transparent; }
      30%  { text-shadow: 0 0 24px var(--green), 0 0 48px rgba(57,255,145,0.4); }
      100% { text-shadow: 0 0 8px rgba(57,255,145,0.25); }
    }
    .totp-display.has-code { animation: glow-in 0.6s ease forwards; }
    .totp-meta { text-align: center; font-family: var(--mono); font-size: 11px; color: var(--muted); margin-bottom: 24px; min-height: 18px; }

    /* Display */
    .field-label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }

    textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 3px; color: var(--text); font-family: var(--mono);
      font-size: 14px; padding: 12px; resize: vertical; min-height: 80px;
      outline: none; transition: border-color 0.2s; line-height: 1.5;
    }
    textarea:focus { border-color: var(--border-hi); }

    .controls-row {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 12px; margin-top: 14px;
    }
    .control-group { display: flex; flex-direction: column; gap: 6px; }
    .control-group label { font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
    .control-group span  { font-family: var(--mono); font-size: 11px; color: var(--text); }

    input[type=range] {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 2px; background: var(--border-hi);
      border-radius: 1px; outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px;
      border-radius: 50%; background: var(--accent); cursor: pointer;
    }

    .rotate-row {
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .rotate-label {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; font-family: var(--mono); font-size: 11px;
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted);
      user-select: none;
    }
    .rotate-label input[type=checkbox] { display: none; }
    .rotate-box {
      width: 20px; height: 20px; border: 1px solid var(--border);
      border-radius: 3px; display: flex; align-items: center; justify-content: center;
      font-size: 13px; background: var(--bg); transition: border-color 0.2s, color 0.2s;
    }
    .rotate-label:has(input:checked) .rotate-box {
      border-color: var(--accent); color: var(--accent);
    }

    .display-status {
      margin-top: 14px; padding: 10px 14px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 3px;
      font-family: var(--mono); font-size: 12px; color: var(--muted);
      min-height: 40px; display: flex; align-items: center; gap: 8px;
    }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex-shrink: 0; transition: background 0.3s; }
    .status-dot.active { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .display-actions { margin-top: 14px; display: flex; gap: 10px; }

    /* Buttons */
    .btn {
      font-family: var(--mono); font-size: 12px; letter-spacing: 0.1em;
      text-transform: uppercase; border: 1px solid; border-radius: 3px;
      padding: 10px 20px; cursor: pointer; transition: all 0.15s;
      position: relative; overflow: hidden;
    }
    .btn::after { content: ''; position: absolute; inset: 0; background: currentColor; opacity: 0; transition: opacity 0.15s; }
    .btn:active::after { opacity: 0.12; }
    .btn-primary { background: transparent; color: var(--accent); border-color: var(--accent); width: 100%; }
    .btn-primary:hover { background: rgba(0,229,255,0.07); box-shadow: 0 0 14px rgba(0,229,255,0.2); }
    .btn-send { background: transparent; color: var(--green); border-color: var(--green); flex: 1; }
    .btn-send:hover { background: rgba(57,255,145,0.07); box-shadow: 0 0 14px rgba(57,255,145,0.2); }
    .btn-stop { background: transparent; color: var(--accent2); border-color: var(--accent2); flex: 1; }
    .btn-stop:hover { background: rgba(255,95,64,0.07); box-shadow: 0 0 14px rgba(255,95,64,0.2); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; pointer-events: none; }

    @media (max-width: 620px) {
      main { grid-template-columns: 1fr; padding: 20px 16px; }
      header { padding: 14px 16px; }
    }
  </style>
</head>
<body>
<div class="shell">

  <header>
    <div class="logo">RPi<span>//</span>Dashboard</div>
    <div class="clock" id="clock">--:--:--</div>
  </header>

  <main>

    <!-- 2FA Card -->
    <div class="card">
      <div class="card-header">
        <span class="card-tag">01</span>
        <span class="card-title">Two-Factor Auth</span>
      </div>
      <div class="card-body">
        <div class="totp-display" id="totpDisplay">------</div>
        <div class="totp-meta" id="totpMeta">press button to generate</div>
        <button class="btn btn-primary" id="totpBtn" onclick="fetchTOTP()">Generate Code</button>
      </div>
    </div>

    <!-- Display Card -->
    <div class="card">
      <div class="card-header">
        <span class="card-tag">02</span>
        <span class="card-title">LED Matrix Display</span>
      </div>
      <div class="card-body">
        <div class="field-label">Text to scroll (Latin &amp; Ukrainian)</div>
        <textarea id="displayText" placeholder="Введіть текст або Enter text..."></textarea>

        <div class="controls-row">
          <div class="control-group">
            <label>Speed <span id="speedVal">40 ms/col</span></label>
            <input type="range" id="speedSlider" min="15" max="120" value="40"
                   oninput="document.getElementById('speedVal').textContent = this.value + ' ms/col'">
          </div>
          <div class="control-group">
            <label>Brightness <span id="brightVal">5 / 15</span></label>
            <input type="range" id="brightSlider" min="0" max="15" value="5"
                   oninput="document.getElementById('brightVal').textContent = this.value + ' / 15'">
          </div>
        </div>

        <div class="rotate-row">
          <label class="rotate-label">
            <input type="checkbox" id="rotateCheck">
            <span class="rotate-box">⟳</span>
            Rotate 180°
          </label>
          <label class="rotate-label">
            <input type="checkbox" id="dirCheck">
            <span class="rotate-box">←</span>
            Left-to-right
          </label>
        </div>

        <div class="display-status">
          <div class="status-dot" id="statusDot"></div>
          <span id="statusText">Idle</span>
        </div>

        <div class="display-actions">
          <button class="btn btn-send" id="sendBtn" onclick="sendDisplay()">▶ Send</button>
          <button class="btn btn-stop" id="stopBtn" onclick="stopDisplay()" disabled>■ Stop</button>
        </div>
      </div>
    </div>

  </main>
</div>

<script>
  function updateClock() {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString('en-GB', { hour12: false });
  }
  updateClock();
  setInterval(updateClock, 1000);

  async function fetchTOTP() {
    const display = document.getElementById('totpDisplay');
    const meta    = document.getElementById('totpMeta');
    const btn     = document.getElementById('totpBtn');
    display.className = 'totp-display loading';
    display.textContent = 'generating...';
    meta.textContent = '';
    btn.disabled = true;
    try {
      const res  = await fetch('/api/totp');
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Server error');
      display.className = 'totp-display has-code';
      display.textContent = data.code.slice(0, 3) + ' ' + data.code.slice(3);
      meta.textContent = `generated at ${new Date().toLocaleTimeString()}`;
    } catch (err) {
      display.className = 'totp-display error';
      display.textContent = err.message;
      meta.textContent = '';
    } finally {
      btn.disabled = false;
    }
  }

  async function sendDisplay() {
    const text       = document.getElementById('displayText').value.trim();
    const speed      = parseInt(document.getElementById('speedSlider').value);
    const brightness = parseInt(document.getElementById('brightSlider').value);
    const rotate     = document.getElementById('rotateCheck').checked;
    const direction  = document.getElementById('dirCheck').checked ? 'ltr' : 'rtl';
    const sendBtn    = document.getElementById('sendBtn');
    const stopBtn    = document.getElementById('stopBtn');
    if (!text) { setStatus('Enter some text first.', false); return; }
    sendBtn.disabled = true;
    setStatus('Sending...', false);
    try {
      const res  = await fetch('/api/display', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, speed, brightness, rotate, direction }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Server error');
      setStatus(`Looping: "${text}"${rotate ? ' [180°]' : ''}${direction==='ltr' ? ' [←]' : ''}`, true);
      stopBtn.disabled = false;
    } catch (err) {
      setStatus(`Error: ${err.message}`, false);
    } finally {
      sendBtn.disabled = false;
    }
  }

  async function stopDisplay() {
    document.getElementById('stopBtn').disabled = true;
    try {
      await fetch('/api/display/stop', { method: 'POST' });
      setStatus('Idle', false);
    } catch (err) {
      setStatus(`Error: ${err.message}`, false);
      document.getElementById('stopBtn').disabled = false;
    }
  }

  function setStatus(msg, active) {
    document.getElementById('statusText').textContent = msg;
    document.getElementById('statusDot').className = 'status-dot' + (active ? ' active' : '');
  }

  (async () => {
    try {
      const res  = await fetch('/api/display/status');
      const data = await res.json();
      if (data.active) {
        setStatus(`Looping: "${data.text}"`, true);
        document.getElementById('displayText').value = data.text;
        if (data.speed !== undefined)      document.getElementById('speedSlider').value = data.speed;
        if (data.brightness !== undefined) document.getElementById('brightSlider').value = data.brightness;
        if (data.rotate)              document.getElementById('rotateCheck').checked = true;
        if (data.direction === 'ltr') document.getElementById('dirCheck').checked = true;
        document.getElementById('speedVal').textContent  = (data.speed ?? 40) + ' ms/col';
        document.getElementById('brightVal').textContent = (data.brightness ?? 5) + ' / 15';
        document.getElementById('stopBtn').disabled = false;
      }
    } catch (_) {}
  })();
</script>
</body>
</html>
