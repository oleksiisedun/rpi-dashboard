<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RPi Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="shell">

  <header>
    <div class="logo">RPi<span>//</span>Dashboard</div>
    <div class="clock" id="clock">--:--:--</div>
  </header>

  <main>

    <!-- 2FA Card -->
    <div class="card">
      <div class="card-header">
        <span class="card-tag">01</span>
        <span class="card-title">Two-Factor Auth</span>
      </div>
      <div class="card-body">
        <div class="totp-display" id="totpDisplay">------</div>
        <div class="totp-meta" id="totpMeta">press button to generate</div>
        <button class="btn btn-primary" id="totpBtn" onclick="fetchTOTP()">Generate Code</button>
      </div>
    </div>

    <!-- Display Card -->
    <div class="card">
      <div class="card-header">
        <span class="card-tag">02</span>
        <span class="card-title">LED Matrix Display</span>
      </div>
      <div class="card-body">
        <div class="field-label">Text to scroll (Latin &amp; Ukrainian)</div>
        <textarea id="displayText" placeholder="Введіть текст або Enter text..."></textarea>

        <div class="controls-row">
          <div class="control-group">
            <label>Speed <span id="speedVal">40 ms/col</span></label>
            <input type="range" id="speedSlider" min="15" max="120" value="40"
                   oninput="document.getElementById('speedVal').textContent = this.value + ' ms/col'">
          </div>
          <div class="control-group">
            <label>Brightness <span id="brightVal">5 / 15</span></label>
            <input type="range" id="brightSlider" min="0" max="15" value="5"
                   oninput="document.getElementById('brightVal').textContent = this.value + ' / 15'">
          </div>
        </div>

        <div class="rotate-row">
          <label class="rotate-label">
            <input type="checkbox" id="rotateCheck">
            <span class="rotate-box">⟳</span>
            Rotate 180°
          </label>
          <label class="rotate-label">
            <input type="checkbox" id="dirCheck">
            <span class="rotate-box">←</span>
            Left-to-right
          </label>
        </div>

        <div class="field-label" style="margin-top:14px;">Custom symbols (click to insert)</div>
        <div class="symbol-row" id="symbolRow"></div>

        <div class="display-status">
          <div class="status-dot" id="statusDot"></div>
          <span id="statusText">Idle</span>
        </div>

        <div class="display-actions">
          <button class="btn btn-send" id="sendBtn" onclick="sendDisplay()">▶ Send</button>
          <button class="btn btn-stop" id="stopBtn" onclick="stopDisplay()" disabled>■ Stop</button>
        </div>
      </div>
    </div>

  </main>
</div>

<script>
  function updateClock() {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString('en-GB', { hour12: false });
  }
  updateClock();
  setInterval(updateClock, 1000);

  async function fetchTOTP() {
    const display = document.getElementById('totpDisplay');
    const meta    = document.getElementById('totpMeta');
    const btn     = document.getElementById('totpBtn');
    display.className = 'totp-display loading';
    display.textContent = 'generating...';
    meta.textContent = '';
    btn.disabled = true;
    try {
      const res  = await fetch('/api/totp');
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Server error');
      display.className = 'totp-display has-code';
      display.textContent = data.code.slice(0, 3) + ' ' + data.code.slice(3);
      meta.textContent = `generated at ${new Date().toLocaleTimeString()}`;
    } catch (err) {
      display.className = 'totp-display error';
      display.textContent = err.message;
      meta.textContent = '';
    } finally {
      btn.disabled = false;
    }
  }

  async function sendDisplay() {
    const text       = document.getElementById('displayText').value.trim();
    const speed      = parseInt(document.getElementById('speedSlider').value);
    const brightness = parseInt(document.getElementById('brightSlider').value);
    const rotate     = document.getElementById('rotateCheck').checked;
    const direction  = document.getElementById('dirCheck').checked ? 'ltr' : 'rtl';
    const sendBtn    = document.getElementById('sendBtn');
    const stopBtn    = document.getElementById('stopBtn');
    if (!text) { setStatus('Enter some text first.', false); return; }
    sendBtn.disabled = true;
    setStatus('Sending...', false);
    try {
      const res  = await fetch('/api/display', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, speed, brightness, rotate, direction }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Server error');
      setStatus(`Looping: "${text}"${rotate ? ' [180°]' : ''}${direction==='ltr' ? ' [←]' : ''}`, true);
      stopBtn.disabled = false;
    } catch (err) {
      setStatus(`Error: ${err.message}`, false);
    } finally {
      sendBtn.disabled = false;
    }
  }

  async function stopDisplay() {
    document.getElementById('stopBtn').disabled = true;
    try {
      await fetch('/api/display/stop', { method: 'POST' });
      setStatus('Idle', false);
    } catch (err) {
      setStatus(`Error: ${err.message}`, false);
      document.getElementById('stopBtn').disabled = false;
    }
  }

  function setStatus(msg, active) {
    document.getElementById('statusText').textContent = msg;
    document.getElementById('statusDot').className = 'status-dot' + (active ? ' active' : '');
  }

  function insertSymbol(sym) {
    const ta    = document.getElementById('displayText');
    const start = ta.selectionStart ?? ta.value.length;
    const end   = ta.selectionEnd ?? ta.value.length;
    ta.value = ta.value.slice(0, start) + sym + ta.value.slice(end);
    ta.focus();
    ta.selectionStart = ta.selectionEnd = start + sym.length;
  }

  async function loadCustomSymbols() {
    try {
      const res  = await fetch('/api/custom-symbols');
      const data = await res.json();
      const row  = document.getElementById('symbolRow');
      row.innerHTML = '';
      for (const sym of data.symbols) {
        const chip = document.createElement('button');
        chip.type = 'button';
        chip.className = 'symbol-chip';
        chip.textContent = sym;
        chip.onclick = () => insertSymbol(sym);
        row.appendChild(chip);
      }
    } catch (_) {}
  }
  loadCustomSymbols();

  (async () => {
    try {
      const res  = await fetch('/api/display/status');
      const data = await res.json();
      if (data.active) {
        setStatus(`Looping: "${data.text}"`, true);
        document.getElementById('displayText').value = data.text;
        if (data.speed !== undefined)      document.getElementById('speedSlider').value = data.speed;
        if (data.brightness !== undefined) document.getElementById('brightSlider').value = data.brightness;
        if (data.rotate)              document.getElementById('rotateCheck').checked = true;
        if (data.direction === 'ltr') document.getElementById('dirCheck').checked = true;
        document.getElementById('speedVal').textContent  = (data.speed ?? 40) + ' ms/col';
        document.getElementById('brightVal').textContent = (data.brightness ?? 5) + ' / 15';
        document.getElementById('stopBtn').disabled = false;
      }
    } catch (_) {}
  })();
</script>
</body>
</html>
