<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Glyph Editor — 5×8 LED Matrix Font</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="shell">

  <header>
    <div class="logo">Glyph<span>//</span>Editor</div>
    <div class="header-actions">
      <button class="btn small" id="importBtn">↓ Import JSON</button>
      <input type="file" id="importFile" accept=".json" style="display:none">
      <button class="btn small" id="exportJsonBtn">↑ Export JSON</button>
      <button class="btn accent small" id="scrollToExport">{ } Generate font.js code</button>
    </div>
  </header>

  <main>
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="tabs">
        <div class="tab active" data-tab="latin">Latin</div>
        <div class="tab" data-tab="cyrillic">Cyrillic</div>
        <div class="tab" data-tab="custom">Custom</div>
      </div>
      <div class="search-box">
        <input type="text" id="searchInput" class="input" placeholder="Filter characters...">
      </div>
      <div class="char-list" id="charList"></div>
      <div class="add-char-row">
        <input type="text" id="newCharInput" class="input" maxlength="1" placeholder="Add char…">
        <button class="btn small ok" id="addCharBtn">+ Add</button>
      </div>
    </div>

    <!-- Editor -->
    <div class="editor-panel">
      <div class="editor-grid">

        <div>
          <div class="current-char-label">Editing — <b id="currentCharDisplay">A</b></div>
          <div class="grid-wrap">
            <div class="col-labels" id="colLabels"></div>
            <div class="grid-with-rows">
              <div class="row-labels" id="rowLabels"></div>
              <div class="pixel-grid" id="pixelGrid"></div>
            </div>
          </div>
        </div>

        <div class="right-col">
          <div>
            <div class="panel-label">Preview (×6)</div>
            <canvas id="prev" width="78" height="126"></canvas>
          </div>

          <div>
            <div class="panel-label">Hex bytes (col 0 → 4)</div>
            <div class="hex-row" id="hexRow"></div>
          </div>

          <div>
            <div class="panel-label">Tools</div>
            <div class="actions">
              <button class="btn small" id="clearBtn">Clear</button>
              <button class="btn small" id="invertBtn">Invert</button>
              <button class="btn small" id="flipHBtn">Flip H</button>
              <button class="btn small" id="flipVBtn">Flip V</button>
              <button class="btn small" id="shiftLBtn">← Shift</button>
              <button class="btn small" id="shiftRBtn">→ Shift</button>
              <button class="btn small" id="shiftUBtn">↑ Shift</button>
              <button class="btn small" id="shiftDBtn">↓ Shift</button>
              <button class="btn small danger" id="deleteCharBtn">Delete char</button>
            </div>
          </div>

          <div>
            <div class="panel-label">This glyph — JS snippet</div>
            <div class="output-box" id="singleOutput"></div>
          </div>
        </div>

      </div>

      <div class="export-section" id="exportSection">
        <div class="panel-label">Modified glyphs — paste into font.js</div>
        <div class="hint">
          One <code>'char': [bytes],</code> line per character modified this session.
          Paste each line into the matching object in <code>font.js</code> (usually
          <code>CUSTOM</code>).
        </div>
        <div class="actions" style="margin: 12px 0">
          <button class="btn accent small" id="generateBtn">Regenerate</button>
          <button class="btn small" id="copyExportBtn">Copy to clipboard</button>
        </div>
        <textarea class="export-textarea" id="exportTextarea" spellcheck="false"></textarea>
      </div>
    </div>
  </main>
</div>

<script src="app.js"></script>
</body>
</html>
